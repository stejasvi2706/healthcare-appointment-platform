spring:
  application:
    name: healthcare-appointment-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/healthcare_appointments}
    username: ${DB_USERNAME:healthcare}
    password: ${DB_PASSWORD:healthcare}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-none}]"

app:
  security:
    jwt:
      secret: ${JWT_SECRET:development-only-change-this-secret-please}
      ttl-seconds: ${JWT_TTL_SECONDS:86400}
  kafka:
    topics:
      appointment-events: ${APPOINTMENT_EVENTS_TOPIC:appointment.events}
