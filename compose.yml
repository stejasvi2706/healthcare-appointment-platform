services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthcare_appointments
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare -d healthcare_appointments"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic appointment.events --partitions 1 --replication-factor 1

  backend:
    build:
      context: ./web/backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/healthcare_appointments
      DB_USERNAME: healthcare
      DB_PASSWORD: healthcare
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APPOINTMENT_EVENTS_TOPIC: appointment.events
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ./worker
    environment:
      DB_URL: postgresql://healthcare:healthcare@postgres:5432/healthcare_appointments
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APPOINTMENT_EVENTS_TOPIC: appointment.events
      KAFKA_CONSUMER_GROUP: appointment-worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./web/frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  kafka-data:
